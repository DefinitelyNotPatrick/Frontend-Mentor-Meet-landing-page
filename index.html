<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Mentor | Meet landing page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <img class="navbard__logo" src="assets/logo.svg" alt="meet logo">
    </nav>

    <header class="header">
        <div class="header__content">
            <img class="header__content--image" src="assets/tablet/image-hero.png"
                alt="Photo of people that using meet">
            <div class="header__content--text">
                <h1 class="header__content--text--title">Group Chat for Everyone</h1>
                <p class="header__content--text--description">Meet makes it easy to connect with others face-to-face
                    virtually and collaborate across any device</p>
                <div class="header__content--text--button">
                    <button class="header__content--text--buttons header__content--text--button-download">Download <span
                            class="header__content--text--button-download-ver">v1.3</span></button>
                    <button class="header__content--text--buttons header__content--text--button-info">What is
                        it?</button>
                </div>


            </div>
        </div>
    </header>




</body>

</html>
